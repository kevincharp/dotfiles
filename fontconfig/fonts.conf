<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Preferir Noto Color Emoji (a color) sobre la monocromatica para el
       alias generico "emoji". Util para apps que SI consultan el alias. -->
  <alias>
    <family>emoji</family>
    <prefer><family>Noto Color Emoji</family></prefer>
  </alias>

  <!-- Chrome/Chromium en Linux NO usa el alias "emoji": para cada caracter hace
       un match por cobertura de glifo (como `fc-match -s :charset=...`). En ese
       match, Symbola y Noto Emoji (ambas MONOCROMATICAS) rankean por encima de
       Noto Color Emoji, asi que Chrome dibuja los emoji en blanco y negro.
       La cura es sacar esas dos del fallback: Noto Color Emoji cubre todos los
       emoji estandar, asi que no queda hueco. -->
  <selectfont>
    <rejectfont>
      <pattern><patelt name="family"><string>Symbola</string></patelt></pattern>
    </rejectfont>
    <rejectfont>
      <pattern><patelt name="family"><string>Noto Emoji</string></patelt></pattern>
    </rejectfont>
  </selectfont>
</fontconfig>
