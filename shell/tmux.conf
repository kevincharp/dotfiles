# ==============================================================================
#   tmux.conf — Configuracion tmux Kevin Charpentier
#   Se symlinkea a ~/.config/tmux/tmux.conf (ruta default de tmux 3.x).
#
#   Filosofia: paneles estilo Windows Terminal dentro de Ptyxis, con sesion
#   unica 'main' persistente (ver bloque TMUX en shell/bashrc y shell/zshrc).
#   El autoarranque vive en el shell, NO aca.
# ==============================================================================

# ------------------------------------------------------------------------------
# PREFIJO — Ctrl+a (mas comodo que el default Ctrl+b: la 'a' esta al lado de Ctrl)
# ------------------------------------------------------------------------------
# 'send-keys C-a' permite mandar un Ctrl+a literal a la shell pulsandolo dos veces
# (Ctrl+a Ctrl+a), por si necesitas el "ir al inicio de linea" de bash/zsh. La
# tecla Home tambien hace eso.
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ------------------------------------------------------------------------------
# MOUSE — clic para cambiar de panel, arrastrar bordes para redimensionar,
# scroll para ver historial. Sin esto, todo es por teclado.
# ------------------------------------------------------------------------------
set -g mouse on

# ------------------------------------------------------------------------------
# COLORES — true color (24-bit), para que oh-my-posh y el highlighting se vean
# igual que fuera de tmux. 'tmux-256color' es el TERM correcto adentro.
# ------------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm*:Tc"

# ------------------------------------------------------------------------------
# SPLITS — atajos DIRECTOS sin prefijo ('bind -n' = tabla root), para tener
# paridad con Windows Terminal (mismo gesto en ambos SO). Se eligio Alt+letra/
# simbolo y NO Ctrl++ / Ctrl+` porque:
#   - tmux lee BYTES de la terminal, no teclas: Ctrl++ y Ctrl+` no tienen codigo
#     portable (necesitarian extended-keys, fragil).
#   - En teclado espanol la '`' es tecla MUERTA (acentos) → casi incapturable.
#   - Alt+simbolo es fiable y lo intercepta tmux antes que la shell.
#
# Mapeo (espejo de Windows Terminal):
#   Alt + -  → split horizontal (arriba/abajo)  — el '-' es una linea horizontal
#   Alt + .  → split vertical   (lado a lado)
# Los paneles se abren en el MISMO directorio del panel actual.
# OJO si algun dia cambias el mapeo: debe seguir matcheando terminal/settings.json.
# ------------------------------------------------------------------------------
bind -n M-- split-window -v -c "#{pane_current_path}"
bind -n M-. split-window -h -c "#{pane_current_path}"

# Respaldo con prefijo (memoria muscular tmux clasica) + nueva ventana/pestana.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Moverse entre paneles: Alt+flechas directo (sin prefijo) + clic con el mouse.
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R

# ------------------------------------------------------------------------------
# GUARDA TUI — los binds 'bind -n' (tabla root) interceptan teclas/bytes ANTES de
# pasarlos a la app de adentro. Esto es PELIGROSO con apps de pantalla completa
# (Claude Code, nvim, fzf, lazygit...): esas TUIs emiten secuencias de escape
# (ESC w, ESC O A, etc.) que tmux puede confundir con Alt+/Ctrl+tecla y disparar
# un bind "solo". El caso grave era Alt+W -> kill-pane: con un unico panel mataba
# la sesion 'main' y el 'exit' del shell cerraba la terminal entera SIN avisar
# (el confirm-before se auto-respondia con el siguiente byte del stream).
#
# 'is_tui' detecta si el comando en foco es una de esas TUIs (Claude corre como
# 'node'). Cuando lo es, los binds reenvian la tecla CRUDA a la app; si no, hacen
# la accion tmux. 'if-shell -F' evalua un formato (sincrono, sin lanzar shell).
# ------------------------------------------------------------------------------
is_tui='#{m/ri:^(view|l?n?vim|nvim|emacs|claude|node|fzf|lazygit|less|more|man|htop|btop|top)$,#{pane_current_command}}'

# Cerrar panel: Alt+W directo (paridad con Windows Terminal). Requiere haber
# liberado Alt+W en Ptyxis (su close-tab se movio a Ctrl+F4, tambien como en WT),
# si no Ptyxis se lo come antes que tmux. Pide confirmacion antes de matar.
# Si hay una TUI en foco, se le manda Alt+W crudo (no se mata el panel).
bind -n M-w if-shell -F "$is_tui" 'send-keys M-w' 'confirm-before -p "cerrar panel? (y/n)" kill-pane'

# Mover/intercambiar el panel actual con el vecino en la direccion de la flecha:
# Ctrl+flechas (paridad con el swapPane de Windows Terminal). Usa los targets
# direccionales {left-of}/{right-of}/... (tmux 3.1+) para swap por GEOMETRIA real.
# El foco sigue al panel que moviste (sin -d). Con una TUI en foco se reenvia
# Ctrl+flecha crudo, asi nvim/Claude conservan su "saltar de palabra"/navegacion
# y tmux no intercepta secuencias de escape de la app.
bind -n C-Left  if-shell -F "$is_tui" 'send-keys C-Left'  "swap-pane -t '{left-of}'"
bind -n C-Right if-shell -F "$is_tui" 'send-keys C-Right' "swap-pane -t '{right-of}'"
bind -n C-Up    if-shell -F "$is_tui" 'send-keys C-Up'    "swap-pane -t '{up-of}'"
bind -n C-Down  if-shell -F "$is_tui" 'send-keys C-Down'  "swap-pane -t '{down-of}'"

# ------------------------------------------------------------------------------
# INDICES — empezar a numerar ventanas/paneles en 1 (no en 0): la fila de
# numeros del teclado arranca en 1, asi Prefijo+1 va a la primera ventana.
# ------------------------------------------------------------------------------
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ------------------------------------------------------------------------------
# CALIDAD DE VIDA
# ------------------------------------------------------------------------------
set -sg escape-time 10          # menos lag al usar Esc (importante para nvim)
set -g history-limit 50000      # mas scrollback
set -g focus-events on          # apps como nvim detectan foco del panel
setw -g mode-keys vi            # navegacion estilo vi en modo copia (Prefijo + [)

# ------------------------------------------------------------------------------
# STATUS LINE — paleta "Claude Code" (espejo de los colores de terminal/gnome):
#   fondo  #2B2322 (marron oscuro)   texto    #E8E0D4 (crema)
#   purpura #C79BFF (sesion/activa)  naranja  #D4874E (acentos)   gris #6B5448
# Reemplaza el verde default de tmux para que combine con oh-my-posh y el tema.
# ------------------------------------------------------------------------------
set -g status-style "bg=#2B2322,fg=#E8E0D4"
set -g status-left-length 24
set -g status-right-length 60

# Izquierda: nombre de sesion en purpura sobre marron, con separador.
set -g status-left "#[bg=#C79BFF,fg=#2B2322,bold] #S #[bg=#2B2322,fg=#C79BFF]"

# Derecha: directorio del panel + hora, en tonos calidos.
set -g status-right "#[fg=#D4874E]#{b:pane_current_path} #[fg=#6B5448]| #[fg=#E8E0D4]%H:%M "

# Ventana activa: naranja resaltado. Inactivas: crema apagado.
setw -g window-status-current-format "#[bg=#D4874E,fg=#2B2322,bold] #I:#W "
setw -g window-status-format "#[fg=#E8E0D4] #I:#W "
setw -g window-status-separator ""

# Bordes de panel: el activo en naranja, los demas en gris apagado.
set -g pane-border-style "fg=#5C4A44"
set -g pane-active-border-style "fg=#D4874E"

# Mensajes (los de confirm-before, display, etc.): crema sobre marron.
set -g message-style "bg=#2B2322,fg=#E8A76A"

# ------------------------------------------------------------------------------
# Recargar esta config sin reiniciar tmux:  Prefijo + r
# ------------------------------------------------------------------------------
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf recargado"
